  # HOF - EVENTS
  france.36.title: "EXPLICATIONS GAMEPLAY FRANCE"
  france.36.desc: "Sur ce mod il est impossible pour le joueur Français de construire en france métropolitaine.\nPour ce faire les cases en france métropolitaine possèdent un énorme malus de construction.\n\nLorsque que vous avez capitulé, votre matos en stock sera transféré à Haiti vous avez une décision pour l'annexer et ainsi récuperer vos stocks.\n\nVous commencez avec une meilleure industrie qu'en vanilla afin de parvenir à bâtir une économie stable dans vos colonies, à partir de mi 36 pendant 3 ans vous aurez +10 militaires qui vont spawn en france métropolitaine chaque année."
  france.36.a: "FAITES HONNEUR À DE GAULLE !"
  france.105.t: "PREMIÈRE PARTIE DU REARMEMENT !"
  france.105.d: "Comme expliqué au début de partie, du fait que vous ne pouvez pas construire chez vous vous recevrez en tout 4 events qui vous ajouteront à chaque fois +10 militaires."
  france.105.a: "EN AVANT !"
